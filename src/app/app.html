<header>
  <h1>CinéTrack</h1>
  <nav>
    <a routerLink="/tracks" routerLinkActive="active">Catalogue</a>
    @if (auth.isLoggedIn()) {
      <a routerLink="/tracks/new" routerLinkActive="active">Ajouter</a>
    }
  </nav>

  <div class="auth-panel">
    @if (auth.isLoggedIn()) {
      <span>Connecté{{ auth.user()?.name ? ' · ' + auth.user()?.name : '' }}</span>
      <button type="button" (click)="auth.logout()">Se déconnecter</button>
    } @else {
      <a routerLink="/login" routerLinkActive="active">Se connecter</a>
    }
  </div>
</header>

<!-- la vue de la route active s'affiche ici -->
<router-outlet />
