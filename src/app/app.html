<header class="app-header">
  <a class="brand" routerLink="/tracks">Cin&eacute;Track</a>

  <nav class="main-nav" aria-label="Navigation principale">
    <a routerLink="/tracks" routerLinkActive="active">Catalogue</a>
    <a routerLink="/favorites" routerLinkActive="active">Favoris</a>
    @if (auth.isLoggedIn()) {
      <a routerLink="/tracks/new" routerLinkActive="active">Ajouter</a>
    }
  </nav>

  <div class="auth-panel">
    @if (auth.isLoggedIn()) {
      <span>Connect&eacute;{{ auth.user()?.name ? ' - ' + auth.user()?.name : '' }}</span>
      <button type="button" (click)="auth.logout()">Se d&eacute;connecter</button>
    } @else {
      <a routerLink="/login" routerLinkActive="active">Se connecter</a>
    }
  </div>
</header>

<main class="app-main">
  <router-outlet />
</main>
