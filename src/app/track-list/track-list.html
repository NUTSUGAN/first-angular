<section class="grid">
  @for (track of tracks(); track track.id) {
  <app-track-card
    [track]="track"
    [active]="track.id === selection()"
    [canToggleFavorite]="canToggleFavorite()"
    (select)="selectTrack($event)"
    (favoriteToggled)="toggleFavorite($event)"
  />
  } @empty {
  <p>Aucun morceau.</p>
  }
</section>
